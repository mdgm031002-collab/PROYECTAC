<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Visual IA Personalizado</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#contenedor{
    position:relative;
    width:100vw;
    height:100vh;
}

video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

#panel{
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
}

#btnIniciar{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    background-color: #00FF00;
    font-weight: bold;
    color: #000;
}

#estado{
    margin-top:10px;
    color:white;
    background:rgba(0,0,0,.75);
    padding:10px;
    border-radius:10px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="contenedor">
    <video id="video" autoplay playsinline muted></video>
    <div id="panel">
        <button id="btnIniciar">Iniciar Sistema</button>
        <div id="estado">Sistema listo para iniciar</div>
    </div>
</div>

<script>
// Tu enlace de Teachable Machine
const URL_MODELO = "https://teachablemachine.withgoogle.com/models/z892YD6q4/";

const video = document.getElementById("video");
const estado = document.getElementById("estado");

let model;
let listaClases = [];
let ultimaFrase = "";
let ultimoAviso = 0;

// Inicializador de voz en segundo plano
setTimeout(() => {
    if (typeof speechSynthesis !== "undefined") {
        const mensaje = new SpeechSynthesisUtterance("");
        speechSynthesis.speak(mensaje);
        speechSynthesis.cancel();
    }
}, 1000);

function hablar(texto) {
    try {
        if (typeof speechSynthesis === "undefined" || !texto) return;

        const ahora = Date.now();
        if (texto === ultimaFrase && ahora - ultimoAviso < 3000) return;

        if (texto.toLowerCase().includes("fondo") || texto.toLowerCase().includes("vacio")) return;

        const mensaje = new SpeechSynthesisUtterance(texto);
        mensaje.lang = "es-MX";
        mensaje.rate = 1;
        
        speechSynthesis.cancel();

        setTimeout(() => {
            speechSynthesis.speak(mensaje);
        }, 100);

        ultimaFrase = texto;
        ultimoAviso = ahora;
    } catch (error) {
        console.error(error);
    }
}

async function iniciarCamara(){
    const opciones = {
        video: { facingMode: { ideal: "environment" } },
        audio: false
    };
    try {
        const stream = await navigator.mediaDevices.getUserMedia(opciones);
        video.srcObject = stream;
    } catch (err) {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        video.srcObject = stream;
    }
    return new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
}

function vibrar(){
    if(navigator.vibrate) navigator.vibrate(300);
}

async function loop() {
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    if (!model) return;

    // Capturar el cuadro del video de forma matemática pura usando tensores
    const logits = tf.tidy(() => {
        // Redimensionar la imagen a 224x224 (el tamaño estándar que requiere Teachable Machine)
        let img = tf.browser.fromPixels(video);
        let normalizada = img.resizeNearestNeighbor([224, 224]).toFloat().div(tf.scalar(127.5)).sub(tf.scalar(1));
        let batched = normalizada.expandDims(0);
        return model.predict(batched);
    });

    const valores = await logits.data();
    logits.dispose();

    let mayorProbabilidad = 0;
    let indiceGanador = -1;

    // Buscar cuál de tus clases tiene la mayor probabilidad matemática
    for (let i = 0; i < valores.length; i++) {
        if (valores[i] > mayorProbabilidad) {
            mayorProbabilidad = valores[i];
            indiceGanador = i;
        }
    }

    // Si encontramos un objeto y la IA está segura a más del 75%
    if (indiceGanador !== -1 && mayorProbabilidad > 0.75) {
        let objetoDetectado = listaClases[indiceGanador] || "Objeto Desconocido";

        if (objetoDetectado.toLowerCase() !== "fondo" && objetoDetectado.toLowerCase() !== "vacio") {
            estado.textContent = `Detectado: ${objetoDetectado} (${Math.round(mayorProbabilidad * 100)}%)`;
            
            const ahora = Date.now();
            if (ahora - ultimoAviso > 3000) {
                hablar(objetoDetectado);
            }
            
            if (mayorProbabilidad > 0.95) {
                vibrar();
            }
        } else {
            estado.textContent = "Detección activa (Buscando...)";
        }
    }
}

async function iniciarSistema(){
    try{
        if (typeof speechSynthesis !== "undefined") {
            speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        }

        estado.textContent = "Iniciando cámara trasera...";
        await iniciarCamara();
        hablar("Sistema iniciado");

        estado.textContent = "Descargando estructura del modelo...";
        
        // Descargar el archivo de metadatos para leer las etiquetas de tus 25 objetos automáticamente
        const respuestaMeta = await fetch(URL_MODELO + "metadata.json");
        const datosMeta = await respuestaMeta.json();
        listaClases = datosMeta.labels;

        estado.textContent = "Cargando Red Neuronal...";
        // El cargador nativo y ultra estable de TensorFlow directo
        model = await tf.loadLayersModel(URL_MODELO + "model.json");

        hablar("Sistema listo");
        window.requestAnimationFrame(loop);

    } catch(error){
        console.error(error);
        estado.textContent = "Error: " + error.message;
    }
}

document.getElementById("btnIniciar").addEventListener("click", iniciarSistema);
</script>

</body>
</html>
