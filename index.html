<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Visual IA Personalizado</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/tm-image@0.8.5/dist/teachablemachine-image.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#contenedor{
    position:relative;
    width:100vw;
    height:100vh;
}

video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

#panel{
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
}

#btnIniciar{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    background-color: #00FF00;
    font-weight: bold;
    color: #000;
}

#estado{
    margin-top:10px;
    color:white;
    background:rgba(0,0,0,.75);
    padding:10px;
    border-radius:10px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="contenedor">
    <video id="video" autoplay playsinline muted></video>
    <div id="panel">
        <button id="btnIniciar">Iniciar Sistema</button>
        <div id="estado">Esperando inicio...</div>
    </div>
</div>

<script>
// Enlace verificado de tu modelo personalizado de 25 objetos
const URL_MODELO = "https://teachablemachine.withgoogle.com/models/z892YD6q4/";

const video = document.getElementById("video");
const estado = document.getElementById("estado");

let model, maxPredictions;
let ultimaFrase = "";
let ultimoAviso = 0;

// Inicializador de voz en segundo plano
setTimeout(() => {
    if (typeof speechSynthesis !== "undefined") {
        const mensaje = new SpeechSynthesisUtterance("");
        speechSynthesis.speak(mensaje);
        speechSynthesis.cancel();
    }
}, 1000);

function hablar(texto) {
    try {
        if (typeof speechSynthesis === "undefined" || !texto) return;

        const ahora = Date.now();
        if (texto === ultimaFrase && ahora - ultimoAviso < 3000) return;

        if (texto.toLowerCase().includes("fondo") || texto.toLowerCase().includes("vacio")) return;

        const mensaje = new SpeechSynthesisUtterance(texto);
        mensaje.lang = "es-MX";
        mensaje.rate = 1;
        
        speechSynthesis.cancel();

        setTimeout(() => {
            speechSynthesis.speak(mensaje);
        }, 100);

        ultimaFrase = texto;
        ultimoAviso = ahora;
    } catch (error) {
        console.error(error);
    }
}

async function iniciarCamara(){
    const opciones = {
        video: { facingMode: { ideal: "environment" } },
        audio: false
    };
    try {
        const stream = await navigator.mediaDevices.getUserMedia(opciones);
        video.srcObject = stream;
    } catch (err) {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        video.srcObject = stream;
    }
    return new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
}

function vibrar(){
    if(navigator.vibrate) navigator.vibrate(300);
}

async function loop() {
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const prediction = await model.predict(video);
    
    let mayorProbabilidad = 0;
    let objetoDetectado = "";

    for (let i = 0; i < maxPredictions; i++) {
        if (prediction[i].probability > mayorProbabilidad) {
            mayorProbabilidad = prediction[i].probability;
            objetoDetectado = prediction[i].className;
        }
    }

    if (mayorProbabilidad > 0.75) {
        if (objetoDetectado.toLowerCase() !== "fondo" && objetoDetectado.toLowerCase() !== "vacio") {
            estado.textContent = `Detectado: ${objetoDetectado} (${Math.round(mayorProbabilidad * 100)}%)`;
            
            const ahora = Date.now();
            if (ahora - ultimoAviso > 3000) {
                hablar(objetoDetectado);
            }
            
            if (mayorProbabilidad > 0.95) {
                vibrar();
            }
        } else {
            estado.textContent = "Detección activa (Buscando...)";
        }
    }
}

async function iniciarSistema(){
    try{
        if (typeof speechSynthesis !== "undefined") {
            speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        }

        // Verificación de seguridad por si las CDN de Google tardaron en responder
        if (typeof tmImage === "undefined") {
            throw new Error("La librería de inteligencia artificial aún está descargándose. Por favor, espera 5 segundos y vuelve a presionar el botón.");
        }

        estado.textContent = "Iniciando cámara trasera...";
        await iniciarCamara();
        hablar("Sistema iniciado");

        estado.textContent = "Cargando tu modelo personalizado...";
        const modelURL = URL_MODELO + "model.json";
        const metadataURL = URL_MODELO + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        hablar("Sistema listo");
        window.requestAnimationFrame(loop);

    } catch(error){
        console.error(error);
        estado.textContent = "Error: " + error.message;
    }
}

document.getElementById("btnIniciar").addEventListener("click", iniciarSistema);
</script>

</body>
</html>
