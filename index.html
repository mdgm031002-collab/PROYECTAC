<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Assist IA - Premium</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

<style>
:root {
    --primary: #00ff66;
    --primary-glow: rgba(0, 255, 102, 0.3);
    --bg-dark: #0a0f1d;
    --panel-bg: rgba(16, 24, 48, 0.85);
    --text-main: #f0f4f8;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body{
    background-color: var(--bg-dark);
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text-main);
}

#contenedor{
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
}

video{
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
}

/* Capa de diseño HUD sobre la cámara */
.hud-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 24px;
}

#panel-control {
    pointer-events: auto;
    align-self: flex-start;
    background: var(--panel-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 18px;
    border-radius: 16px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    max-width: 340px;
    width: 100%;
    transition: all 0.3s ease;
}

#btnIniciar{
    width: 100%;
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    background: var(--primary);
    color: #020611;
    box-shadow: 0 4px 15px var(--primary-glow);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

#btnIniciar:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 255, 102, 0.5);
}

#btnIniciar:active {
    transform: translateY(1px);
}

#estado{
    margin-top: 14px;
    font-size: 14px;
    color: #a0aec0;
    line-height: 1.4;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
}

/* Tarjeta flotante inferior que se activa al detectar objetos */
#notificacion-deteccion {
    align-self: center;
    background: rgba(2, 6, 17, 0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 2px solid var(--primary);
    box-shadow: 0 0 25px var(--primary-glow);
    padding: 16px 32px;
    border-radius: 40px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-align: center;
    z-index: 3;
}

#notificacion-deteccion.activo {
    opacity: 1;
    transform: translateY(0);
}

/* Indicador visual de escaneo parpadeante */
.scanner-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    animation: scanning 4s linear infinite;
    z-index: 2;
    opacity: 0.4;
    display: none;
}

@keyframes scanning {
    0% { top: 0%; }
    50% { top: 100%; }
    100% { top: 0%; }
}
</style>
</head>

<body>

<div id="contenedor">
    <div class="scanner-line" id="lineaEscaner"></div>
    <video id="video" autoplay playsinline muted></video>
    
    <div class="hud-overlay">
        <div id="panel-control">
            <button id="btnIniciar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                Iniciar Asistente
            </button>
            <div id="estado">🟢 Sistema listo para arrancar</div>
        </div>
        
        <div id="notificacion-deteccion">Buscando...</div>
    </div>
</div>

<script>
// Tu enlace de Teachable Machine
const URL_MODELO = "https://teachablemachine.withgoogle.com/models/z892YD6q4/";

const video = document.getElementById("video");
const estado = document.getElementById("estado");
const notificacion = document.getElementById("notificacion-deteccion");
const lineaEscaner = document.getElementById("lineaEscaner");

let model;
let listaClases = [];
let ultimaFrase = "";
let ultimoAviso = 0;

// Inicializador de voz silencioso en segundo plano
setTimeout(() => {
    if (typeof speechSynthesis !== "undefined") {
        const mensaje = new SpeechSynthesisUtterance("");
        speechSynthesis.speak(mensaje);
        speechSynthesis.cancel();
    }
}, 1000);

function hablar(texto) {
    try {
        if (typeof speechSynthesis === "undefined" || !texto) return;

        const ahora = Date.now();
        if (texto === ultimaFrase && ahora - ultimoAviso < 3000) return;

        if (texto.toLowerCase().includes("fondo") || texto.toLowerCase().includes("vacio")) return;

        const mensaje = new SpeechSynthesisUtterance(texto);
        mensaje.lang = "es-MX";
        mensaje.rate = 1;
        
        speechSynthesis.cancel();

        setTimeout(() => {
            speechSynthesis.speak(mensaje);
        }, 100);

        ultimaFrase = texto;
        ultimoAviso = ahora;
    } catch (error) {
        console.error(error);
    }
}

async function iniciarCamara(){
    const opciones = {
        video: { facingMode: { ideal: "environment" } },
        audio: false
    };
    try {
        const stream = await navigator.mediaDevices.getUserMedia(opciones);
        video.srcObject = stream;
    } catch (err) {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        video.srcObject = stream;
    }
    return new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
}

function vibrar(){
    if(navigator.vibrate) navigator.vibrate(300);
}

async function loop() {
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    if (!model) return;

    const logits = tf.tidy(() => {
        let img = tf.browser.fromPixels(video);
        let normalizada = img.resizeNearestNeighbor([224, 224]).toFloat().div(tf.scalar(127.5)).sub(tf.scalar(1));
        let batched = normalizada.expandDims(0);
        return model.predict(batched);
    });

    const valores = await logits.data();
    logits.dispose();

    let mayorProbabilidad = 0;
    let indiceGanador = -1;

    for (let i = 0; i < valores.length; i++) {
        if (valores[i] > mayorProbabilidad) {
            mayorProbabilidad = valores[i];
            indiceGanador = i;
        }
    }

    if (indiceGanador !== -1 && mayorProbabilidad > 0.75) {
        let objetoDetectado = listaClases[indiceGanador] || "Objeto Desconocido";

        if (objetoDetectado.toLowerCase() !== "fondo" && objetoDetectado.toLowerCase() !== "vacio") {
            // Actualizar la interfaz bonita flotante
            notificacion.textContent = `🔍 ${objetoDetectado.toUpperCase()} (${Math.round(mayorProbabilidad * 100)}%)`;
            notificacion.classList.add("activo");
            
            const ahora = Date.now();
            if (ahora - ultimoAviso > 3000) {
                hablar(objetoDetectado);
            }
            
            if (mayorProbabilidad > 0.95) {
                vibrar();
            }
        } else {
            notificacion.classList.remove("activo");
            estado.textContent = "🔍 Analizando entorno en tiempo real...";
        }
    } else {
        notificacion.classList.remove("activo");
    }
}

async function iniciarSistema(){
    try{
        if (typeof speechSynthesis !== "undefined") {
            speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        }

        estado.textContent = "📸 Accediendo al lente trasero...";
        await iniciarCamara();
        hablar("Sistema iniciado");

        estado.textContent = "📡 Descargando mapa de metadatos...";
        const respuestaMeta = await fetch(URL_MODELO + "metadata.json");
        const datosMeta = await respuestaMeta.json();
        listaClases = datosMeta.labels;

        estado.textContent = "🧠 Sincronizando Red Neuronal...";
        model = await tf.loadLayersModel(URL_MODELO + "model.json");

        hablar("Sistema listo");
        lineaEscaner.style.display = "block"; // Activar la línea láser animada
        estado.textContent = "🚀 IA en funcionamiento continuo";
        window.requestAnimationFrame(loop);

    } catch(error){
        console.error(error);
        estado.textContent = "❌ Error: " + error.message;
    }
}

document.getElementById("btnIniciar").addEventListener("click", iniciarSistema);
</script>

</body>
</html>
